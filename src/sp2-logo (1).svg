<svg
  width="600"
  height="600"
  viewBox="0 0 600 600"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Gradients matching the theme -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #1e3a8a; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #2563eb; stop-opacity: 1" />
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #fb923c; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #f59e0b; stop-opacity: 1" />
    </linearGradient>

    <radialGradient id="fieldGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color: #86efac; stop-opacity: 1" />
      <stop offset="50%" style="stop-color: #22c55e; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #16a34a; stop-opacity: 1" />
    </radialGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #1e3a8a; stop-opacity: 1" />
      <stop offset="50%" style="stop-color: #2563eb; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #fb923c; stop-opacity: 1" />
    </linearGradient>

    <!-- Cricket ball pattern -->
    <radialGradient id="ballGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color: #ef4444; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #991b1b; stop-opacity: 1" />
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for SP2 -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="#f8fafc"/>

  <!-- Cricket Ground - Outer boundary - very subtle -->
  <circle cx="300" cy="300" r="270" fill="url(#fieldGradient)" opacity="0.08"/>
  
  <!-- Boundary circle -->
  <circle cx="300" cy="300" r="270" fill="none" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="10,5" opacity="0.1"/>
  
  <!-- 30-yard circle -->
  <circle cx="300" cy="300" r="180" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.08"/>

  <!-- Cricket Pitch - vertical in center - subtle -->
  <rect x="285" y="230" width="30" height="140" fill="#d4a574" opacity="0.15" stroke="#92400e" stroke-width="0.5"/>
  
  <!-- Pitch creases -->
  <line x1="275" y1="250" x2="325" y2="250" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>
  <line x1="275" y1="350" x2="325" y2="350" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

  <!-- ML Neural Network Pattern - Left side - more subtle -->
  <g opacity="0.15" stroke="#2563eb" fill="#2563eb">
    <!-- Nodes -->
    <circle cx="100" cy="260" r="3"/>
    <circle cx="100" cy="300" r="3"/>
    <circle cx="100" cy="340" r="3"/>
    
    <circle cx="150" cy="280" r="4"/>
    <circle cx="150" cy="320" r="4"/>
    
    <!-- Connections -->
    <line x1="100" y1="260" x2="150" y2="280" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="300" x2="150" y2="280" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="300" x2="150" y2="320" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="340" x2="150" y2="320" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ML Neural Network Pattern - Right side - more subtle -->
  <g opacity="0.15" stroke="#fb923c" fill="#fb923c">
    <!-- Nodes -->
    <circle cx="500" cy="260" r="3"/>
    <circle cx="500" cy="300" r="3"/>
    <circle cx="500" cy="340" r="3"/>
    
    <circle cx="450" cy="280" r="4"/>
    <circle cx="450" cy="320" r="4"/>
    
    <!-- Connections -->
    <line x1="500" y1="260" x2="450" y2="280" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
    <line x1="500" y1="300" x2="450" y2="280" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
    <line x1="500" y1="300" x2="450" y2="320" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
    <line x1="500" y1="340" x2="450" y2="320" stroke="#fb923c" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- PowerPlay arcs - subtle -->
  <path 
    d="M 250 130 A 170 170 0 0 1 460 280" 
    fill="none" 
    stroke="url(#blueGradient)" 
    stroke-width="2" 
    opacity="0.1"
  />
  <path 
    d="M 140 280 A 170 170 0 0 1 350 130" 
    fill="none" 
    stroke="url(#blueGradient)" 
    stroke-width="2" 
    opacity="0.1"
  />

  <!-- Data flow lines (ML element) - very subtle -->
  <g opacity="0.08">
    <path d="M 150 280 L 220 240" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,4"/>
    <path d="M 150 320 L 220 280" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,4"/>
    <path d="M 450 280 L 380 240" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,4"/>
    <path d="M 450 320 L 380 280" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>

  <!-- Central hexagon (ML/Tech element) - PROMINENT -->
  <path
    d="M 315 160 L 395 205 L 395 295 L 315 340 L 235 295 L 235 205 Z"
    fill="rgba(255, 255, 255, 0.97)"
    stroke="url(#blueGradient)"
    stroke-width="5"
    filter="url(#glow)"
  />

  <!-- Inner hexagon accent -->
  <path
    d="M 315 175 L 380 213 L 380 287 L 315 325 L 250 287 L 250 213 Z"
    fill="none"
    stroke="url(#orangeGradient)"
    stroke-width="2.5"
    opacity="0.4"
  />

  <!-- Main "SP2" Text - LARGEST AND MOST PROMINENT -->
  <text
    x="315"
    y="320"
    font-family="Arial, sans-serif"
    font-size="150"
    font-weight="900"
    fill="url(#textGradient)"
    text-anchor="middle"
    filter="url(#strongGlow)"
    letter-spacing="7"
  >
    SP<tspan font-size="100" baseline-shift="super">2</tspan>
  </text>

  <!-- Cricket bat accent - smaller, top left -->
  <g transform="translate(225, 180) rotate(-25)" opacity="0.35">
    <rect x="0" y="0" width="8" height="40" rx="2" fill="url(#orangeGradient)"/>
    <rect x="1" y="32" width="6" height="12" fill="#78350f"/>
  </g>

  <!-- Cricket bat accent - smaller, top right -->
  <g transform="translate(397, 180) rotate(25)" opacity="0.35">
    <rect x="0" y="0" width="8" height="40" rx="2" fill="url(#orangeGradient)"/>
    <rect x="1" y="32" width="6" height="12" fill="#78350f"/>
  </g>

  <!-- Cricket ball - smaller, left -->
  <circle cx="255" cy="250" r="10" fill="url(#ballGradient)" opacity="0.5"/>
  <path d="M 250 246 Q 255 247.5 260 246" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.6"/>
  <path d="M 250 254 Q 255 252.5 260 254" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.6"/>

  <!-- Cricket ball - smaller, right -->
  <circle cx="375" cy="250" r="10" fill="url(#ballGradient)" opacity="0.5"/>
  <path d="M 370 246 Q 375 247.5 380 246" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.6"/>
  <path d="M 370 254 Q 375 252.5 380 254" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.6"/>

  <!-- Small stumps - smaller, bottom left -->
  <g transform="translate(275, 305)" opacity="0.3">
    <rect x="0" y="0" width="3" height="15" fill="url(#orangeGradient)" rx="1"/>
    <rect x="5" y="0" width="3" height="15" fill="url(#orangeGradient)" rx="1"/>
    <rect x="10" y="0" width="3" height="15" fill="url(#orangeGradient)" rx="1"/>
    <!-- Bails -->
    <rect x="-1" y="-2" width="15" height="2.5" fill="#fbbf24" rx="1"/>
  </g>

  <!-- Small stumps - smaller, bottom right -->
  <g transform="translate(340, 305)" opacity="0.3">
    <rect x="0" y="0" width="3" height="15" fill="url(#orangeGradient)" rx="1"/>
    <rect x="5" y="0" width="3" height="15" fill="url(#orangeGradient)" rx="1"/>
    <rect x="10" y="0" width="3" height="15" fill="url(#orangeGradient)" rx="1"/>
    <!-- Bails -->
    <rect x="-1" y="-2" width="15" height="2.5" fill="#fbbf24" rx="1"/>
  </g>

  <!-- Corner data points (ML element) - very subtle -->
  <circle cx="80" cy="80" r="4" fill="#2563eb" opacity="0.15"/>
  <circle cx="520" cy="80" r="4" fill="#fb923c" opacity="0.15"/>
  <circle cx="80" cy="520" r="4" fill="#fb923c" opacity="0.15"/>
  <circle cx="520" cy="520" r="4" fill="#2563eb" opacity="0.15"/>
</svg>